# ------------------------------------------------------------------------------
# Description
#
description:
  title:                                AmplitudeJS
  scope:                                User control settings
  location:                             _data/modules/amplitude_control.yml

# ------------------------------------------------------------------------------
# User settings
#
settings:

  # ----------------------------------------------------------------------------
  # claude - Fix Amplitude YAML data processing #1
  # GLOBAL (user) settings, optional
  #
  # All keys of the DEFAULTS configuration (see
  # _data/modules/defaults/amplitude.yml, sections 'player' and 'playlist')
  # can be overloaded here for ALL players|playlists of a page. Per-player
  # overloads are placed on the players[] entries below. The effective
  # settings for ONE player instance are resolved as a DEEP merge of the
  # inheritance chain (later overloads earlier):
  #
  #   player settings -> overload user settings -> overload default settings
  #
  # Example:
  #
  # player:
  #   display_hours:                    true                                    # show hours in ALL players of a page
  #   player_scroller_song_element_min: 8                                       # scrollbar threshold for ALL players
  #
  # playlist:
  #   audio_info:                       true                                    # info links in ALL playlists
  # ----------------------------------------------------------------------------

  # ----------------------------------------------------------------------------
  # PLAYER settings
  # ----------------------------------------------------------------------------
  #
  players:

    # --------------------------------------------------------------------------
    # MINI player, Emancipator
    # --------------------------------------------------------------------------
    #
    - player:

      # ------------------------------------------------------------------------
      # GENERAL settings
      #       
      enabled:                          true

      # ------------------------------------------------------------------------
      # PLAYER settings
      #  
      id:                               emancipator_mini
      type:                             mini

      # PLAYLIST settings
      #
      playlist:
        name:                           emancipator

    # --------------------------------------------------------------------------
    # COMPACT player, Emancipator
    # --------------------------------------------------------------------------
    #
    - player:

      # ------------------------------------------------------------------------
      # GENERAL settings
      #       
      enabled:                          true

      # ------------------------------------------------------------------------
      # PLAYER settings
      #  
      id:                               emancipator_compact
      type:                             compact

      # ------------------------------------------------------------------------
      # PLAYLIST settings
      #
      playlist:
        name:                           emancipator

      # ------------------------------------------------------------------------
      # CONTROL settings
      #
      # skip_forward_backward_button:     true                                  # default: true
      # song_progress_bar:              false                                   # currently dont work om player level
      # forward_backward_skip_seconds:  30                                      # currently dont work on player level
      #
      # claude - Fix Amplitude YAML data processing #1
      # NOTE: per-player overloads of skip_forward_backward_button and
      # song_progress_bar are WORKING since this fix (resolved by key
      # presence via the deep_merge inheritance chain; boolean false
      # overloads a default|user true). forward_backward_skip_seconds is
      # still consumed page-globally by the adapter (candidate for a later
      # fix: per-instance skip seconds at the UI event sites).

    # --------------------------------------------------------------------------
    # LARGE player, Emancipator
    # --------------------------------------------------------------------------
    #
    - player:

      # ------------------------------------------------------------------------
      # GENERAL settings
      #     
      enabled:                          true

      # ------------------------------------------------------------------------
      # PLAYER settings
      #
      id:                               emancipator_large
      type:                             large

      # ------------------------------------------------------------------------
      # PLAYLIST settings
      #
      playlist:
        name:                           emancipator

    # --------------------------------------------------------------------------
    # LARGE player, Ludovico Einaudi
    # --------------------------------------------------------------------------
    #
    - player:

      # ------------------------------------------------------------------------
      # GENERAL settings
      #     
      enabled:                          true

      # ------------------------------------------------------------------------
      # PLAYER settings
      #
      id:                               einaudi_yt_large
      type:                             large
      source:                           video

      # ------------------------------------------------------------------------
      # PLAYLIST settings
      #
      playlist:
        name:                           ludovico_einaudi_yt

      # ------------------------------------------------------------------------
      # PLUGIN settings
      #
      plugin_manager:
        enabled:                        true
        plugins:                        [ ytp ]

    # --------------------------------------------------------------------------
    # LARGE player, Bea and her Business
    # --------------------------------------------------------------------------
    #
    - player:

      # ------------------------------------------------------------------------
      # GENERAL settings
      #    
      enabled:                          true

      # ------------------------------------------------------------------------
      # PLAYER settings
      #
      id:                               bea_yt_large
      type:                             large
      source:                           video

      # ------------------------------------------------------------------------
      # PLAYLIST settings
      #      
      playlist:
        name:                           bea_yt

      # ------------------------------------------------------------------------
      # PLUGIN settings
      #
      plugin_manager:
        enabled:                        true
        plugins:                        [ ytp ]

# ------------------------------------------------------------------------------
# END config