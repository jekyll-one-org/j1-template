# ==============================================================================
# DESCRIPTION
# ==============================================================================
#
description:
  title:                                J1 Swiper
  scope:                                User control settings
  location:                             _data/modules/swiper_control.yml

# ==============================================================================
# APP configuration
# ==============================================================================
#
settings:

  # ============================================================================
  # SWIPER configuration
  # ----------------------------------------------------------------------------
  swipers:

    # --------------------------------------------------------------------------
    # TEXT Swipers
    # --------------------------------------------------------------------------

    # --------------------------------------------------------------------------
    # TEXT Swiper|Layout Base
    #    
    - swiper:

      # ------------------------------------------------------------------------
      # GENERAL Options
      # ------------------------------------------------------------------------
      #
      enabled:                          true
      id:                               swiper_text_base
      layout:                           text/base
      media_set:                        j1_headlines
      swiper_classes:                   false
      container_classes:                swiper-text-base
      wrapper_styles:                   false

      # ------------------------------------------------------------------------
      # CORE Options
      # ------------------------------------------------------------------------
      #
      parameters:
        loop:                           true
        speed:                          1200

      # ------------------------------------------------------------------------
      # MODULE Options
      # ------------------------------------------------------------------------
      #
      module_settings:
        autoplay:
          enabled:                      true
          delay:                        3500
          pauseOnMouseEnter:            true
          disableOnInteraction:         false
        pagination:
          enabled:                      false

      # ------------------------------------------------------------------------
      # EVENT Options
      # ------------------------------------------------------------------------
      #
      events:
        enabled:                        false
        init: >
                                        function (swiper) {
                                          // do something on initialization
                                          console.log ('\n' + 'Entered event: init');
                                        }
        afterInit: >
                                        function (swiper) {
                                          // do something after initialization
                                          console.log ('\n' + 'Entered event: afterInit');
                                        }

    # --------------------------------------------------------------------------
    # TEXT Swiper|Layout Parallax
    #    
    - swiper:

      # ------------------------------------------------------------------------
      # GENERAL Options
      # ------------------------------------------------------------------------
      #
      enabled:                          true
      id:                               swiper_text_parallax
      layout:                           text/parallax
      gridify:                          true
      # background-image:               /assets/image/quote/default.jpg
      # quote-text-color:               rgba(255, 255, 255, .75)
      media_set:                        j1_headlines
      swiper_classes:                   false
      container_classes:                swiper-text-parallax
      wrapper_styles:                   false

      # ------------------------------------------------------------------------
      # CORE Options
      # ------------------------------------------------------------------------
      #
      parameters:
        loop:                           true
        speed:                          1200

      # ------------------------------------------------------------------------
      # MODULE Options
      # ------------------------------------------------------------------------
      #
      module_settings:
        autoplay:
          enabled:                      true
          delay:                        3500
          pauseOnMouseEnter:            true
          disableOnInteraction:         false
        pagination:
          enabled:                      false

      # ------------------------------------------------------------------------
      # EVENT Options
      # ------------------------------------------------------------------------
      #
      events:
        enabled:                        false
        init: >
                                        function (swiper) {
                                          // do something on initialization
                                          console.log ('\n' + 'Entered event: init');
                                        }
        afterInit: >
                                        function (swiper) {
                                          // do something after initialization
                                          console.log ('\n' + 'Entered event: afterInit');
                                        }


    # --------------------------------------------------------------------------
    # IMAGE Swipers
    # --------------------------------------------------------------------------

    # --------------------------------------------------------------------------
    # IMAGE Swiper|Layout Base, Full-width
    #
    - swiper:

      # ------------------------------------------------------------------------
      # GENERAL Options
      # ------------------------------------------------------------------------
      #
      enabled:                          true
      id:                               swiper_image_base_full_width_pagination
      layout:                           image/base
      media_set:                        free_animal
      swiper_classes:                   false
      container_classes:                false
      wrapper_styles:                   false

      # ------------------------------------------------------------------------
      # CAPTION Options
      # ------------------------------------------------------------------------
      #
      captions:
        enabled:                        false
        css_class:                      swp-caption-content

      # ------------------------------------------------------------------------
      # CORE Options
      # ------------------------------------------------------------------------
      #
      parameters:
        grabCursor:                       true
        loop:                             true

      # ------------------------------------------------------------------------
      # MODULE Options
      # ------------------------------------------------------------------------
      #
      module_settings:
        navigation:
          enabled:                      true
          nextEl:                       .swiper-button-next
          prevEl:                       .swiper-button-prev
        pagination:
          enabled:                      true
          numbered:                     true
          el:                           .swiper-pagination-outer
          clickable:                    true

      # ------------------------------------------------------------------------
      # EVENT Options
      # ------------------------------------------------------------------------
      #
      events:
        enabled:                        false
        init: >
                                        function (swiper) {
                                          var slideHeight = 300;
                                          
                                          siper.slides.forEach(slide => {
                                            slide.style.height = `${slideHeight}px`;
                                          });
                                        }

    # --------------------------------------------------------------------------
    # IMAGE Swiper|Layout Base, Captions
    #
    - swiper:

      # ------------------------------------------------------------------------
      # GENERAL options
      # ------------------------------------------------------------------------
      #
      enabled:                          true
      id:                               swiper_image_base_navigation_pagination
      layout:                           image/base
      media_set:                        free_animal
      swiper_classes:                   false
      container_classes:                false
      wrapper_styles:                   false

      # ------------------------------------------------------------------------
      # CAPTION options
      # ------------------------------------------------------------------------
      #
      captions:                             
        enabled:                        true
        css_class:                      swp-caption-content

      # ------------------------------------------------------------------------
      # CORE Options
      # ------------------------------------------------------------------------
      #
      parameters:
        grabCursor:                     true
        slidesPerView:                  2
        slidesPerGroup:                 2
        spaceBetween:                   5

      # ------------------------------------------------------------------------
      # MODULE Options
      # ------------------------------------------------------------------------
      #
      module_settings:
        navigation:
          enabled:                      true
          nextEl:                       .swiper-button-next
          prevEl:                       .swiper-button-prev
        pagination:
          enabled:                      true
          numbered:                     true
          type:                         bullets
          el:                           .swiper-pagination-outer
          dynamicBullets:               false
          clickable:                    true

      # ------------------------------------------------------------------------
      # EVENT Options
      # ------------------------------------------------------------------------
      #
      events:
        enabled:                        true
        init: >
                                        function (swiper) {
                                          var slideHeight = 300;
                                          swiper.slides.forEach (
                                            slide => {
                                              slide.style.height = `${slideHeight}px`;
                                          });
                                        }

    # --------------------------------------------------------------------------
    # IMAGE Swiper|Layout Base, Captions
    #
    - swiper:

      # ------------------------------------------------------------------------
      # GENERAL Options
      # ------------------------------------------------------------------------
      #
      enabled:                          true
      id:                               swiper_image_base_captions
      layout:                           image/base
      media_set:                        mega_cities_1
      swiper_classes:                   false
      container_classes:                false
      wrapper_styles:                   false

      # ------------------------------------------------------------------------
      # CAPTION Options
      # ------------------------------------------------------------------------
      #
      captions:                             
        enabled:                        true
        css_class:                      swp-caption-content

      # ------------------------------------------------------------------------
      # CORE Options
      # ------------------------------------------------------------------------
      #
      parameters:
        grabCursor:                     true
        slidesPerView:                  2
        slidesPerGroup:                 2
        spaceBetween:                   5

      # ------------------------------------------------------------------------
      # MODULE Options
      # ------------------------------------------------------------------------
      #
      module_settings:
        pagination:
          enabled:                      true
          type:                         bullets
          el:                           .swiper-pagination-outer
          dynamicBullets:               false
          clickable:                    true

      # ------------------------------------------------------------------------
      # EVENT Options
      # ------------------------------------------------------------------------
      #
      events:
        enabled:                        true
        init: >
                                        function (swiper) {
                                          var slideHeight = 300;
                                          swiper.slides.forEach(slide => {
                                            slide.style.height = `${slideHeight}px`;
                                          });
                                        }

      # ------------------------------------------------------------------------
      # LIGHTBOX Options
      # ------------------------------------------------------------------------
      #
      lightbox:
        enabled:                        true

        # ----------------------------------------------------------------------
        # Core Parameters
        # ----------------------------------------------------------------------
        #
        parameters:
          enabled:                      true

        # ----------------------------------------------------------------------
        # CAPTION Options
        # ----------------------------------------------------------------------
        #
        captions:
          enabled:                      true

        # ----------------------------------------------------------------------
        # USER INTERFACE Options
        # ----------------------------------------------------------------------
        #
        ui_controls:
          enabled:                      true

        # ----------------------------------------------------------------------
        # KEYBOARD Options
        # ----------------------------------------------------------------------
        #
        kbd_controls:
          enabled:                      true
 
    # --------------------------------------------------------------------------
    # IMAGE Swiper|Layout Thumbs (top)
    #
    - swiper:

      # ------------------------------------------------------------------------
      # GENERAL Options
      # ------------------------------------------------------------------------
      #
      enabled:                          true
      id:                               thumb_slider_top
      layout:                           image/thumbs
      media_set:                        free_animal
      swiper_classes:                   false
      container_classes:                thumb-slider-top
      wrapper_styles:                   false

      # ------------------------------------------------------------------------
      # CAPTION Options
      # ------------------------------------------------------------------------
      #
      captions:                             
        enabled:                        false
        css_class:                      swp-caption-content

      # ------------------------------------------------------------------------
      # CORE Options
      # ------------------------------------------------------------------------
      #
      parameters:
        direction:                      horizontal

      # ------------------------------------------------------------------------
      # MODULE Options
      # ------------------------------------------------------------------------
      #
      module_settings:
        pagination:
          enabled:                      true
          numbered:                     true
        thumbs:
          enabled:                      true
          swiper_id:                    thumb_slider_top
          speed:                        1000
          grabCursor:                   true
          loop:                         true
          placement:                    top
          spaceBetween:                 5
          slidesPerView:                3

      # ------------------------------------------------------------------------
      # EVENT Options
      # ------------------------------------------------------------------------
      #
      events:
        enabled:                        false
        init: >                         
                                        function (swiper) {
                                          var slideHeight = 550;
                                          swiper.slides.forEach(slide => {
                                            slide.style.height = `${slideHeight}px`;
                                          });
                                        }

        slideChangeTransitionStart: >    
                                        function (swiper) {
                                        thumbSlider.slideTo(swiper.activeIndex);
                                        }

    # --------------------------------------------------------------------------
    # IMAGE Swiper|Layout Neighbor
    #
    - swiper:

      # ------------------------------------------------------------------------
      # GENERAL Options
      # ------------------------------------------------------------------------
      #
      enabled:                          true
      id:                               neighbor_slider
      layout:                           image/neighbor
      media_set:                        neighbor
      swiper_classes:                   neighbor-slider
      container_classes:                false
      wrapper_styles:                   false

      # ------------------------------------------------------------------------
      # CAPTION Options
      # ------------------------------------------------------------------------
      #
      captions:                             
        enabled:                        false
        css_class:                      swp-caption-content

      # ------------------------------------------------------------------------
      # CORE Options
      # ------------------------------------------------------------------------
      #
      parameters:
        direction:                      horizontal
        grabCursor:                     true

      # ------------------------------------------------------------------------
      # MODULE Options
      # ------------------------------------------------------------------------
      #
      module_settings:
        pagination:
          enabled:                      false      
        neighbor:
          enabled:                      true
          centeredSlides:               true
          loop:                         true
          loopAdditionalSlides:         1
          speed:                        800
          swiper_id:                    neighbor_slider

      # ------------------------------------------------------------------------
      # EVENT Options
      # ------------------------------------------------------------------------
      #
      events:
        enabled:                        false

    # --------------------------------------------------------------------------
    # IMAGE Swiper|Layout Panorama
    #
    - swiper:

      # ------------------------------------------------------------------------
      # GENERAL Options
      # ------------------------------------------------------------------------
      # 
      enabled:                          true
      id:                               swiper_image_panorama
      layout:                           image/panorama
      media_set:                        panorama
      swiper_classes:                   panorama-slider
      container_classes:                false
      wrapper_styles:                   "height: 240px; padding: 14px 0;"

      # ------------------------------------------------------------------------
      # CAPTION Options
      # ------------------------------------------------------------------------
      #
      captions:                             
        enabled:                        false
        css_class:                      swp-caption-content

      # ------------------------------------------------------------------------
      # CORE Options
      # ------------------------------------------------------------------------
      #
      parameters:
        centeredSlides:                 true
        effect:                         panorama
        grabCursor:                     true
        loop:                           true
      # loopAdditionalSlides:           1
      # slidesPerView:                  1.5

        breakpoints: {
                                        480: {
                                          slidesPerView: 2,
                                          panoramaEffect: {
                                            rotate: 35,
                                            depth: 150,
                                          },
                                        },
                                        640: {
                                          slidesPerView: 3,
                                          panoramaEffect: {
                                            rotate: 30,
                                            depth: 150,
                                          },
                                        },
                                        1024: {
                                          slidesPerView: 4,
                                          panoramaEffect: {
                                            rotate: 30,
                                            depth: 200,
                                          },
                                        },
                                        1200: {
                                          slidesPerView: 4,
                                          panoramaEffect: {
                                            rotate: 25,
                                            depth: 250,
                                          },
                                        }
        }

      # ------------------------------------------------------------------------
      # MODULE Options
      # ------------------------------------------------------------------------
      #
      module_settings:
        panorama:
          enabled:                      true
          on_click:                     next                                    # false | next
          depth:                        200
          rotate:                       30
        pagination:
          enabled:                      false
          type:                         bullets
          el:                           .swiper-pagination-outer
          dynamicBullets:               false
          clickable:                    true

      # ------------------------------------------------------------------------
      # EVENT Options
      # ------------------------------------------------------------------------
      #
      events:
        enabled:                        false

# ------------------------------------------------------------------------------
# END config