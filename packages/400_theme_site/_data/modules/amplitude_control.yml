# ------------------------------------------------------------------------------
# Description
#
description:
  title:                                AmplitudeJS
  scope:                                User control settings
  location:                             _data/modules/amplitude_control.yml

# ------------------------------------------------------------------------------
# User settings
#
settings:

  # ----------------------------------------------------------------------------
  # PLAYER settings
  # ----------------------------------------------------------------------------
  #
  players:

    # --------------------------------------------------------------------------
    # MINI player, Emancipator
    # --------------------------------------------------------------------------
    #
    - player:

      # ------------------------------------------------------------------------
      # GENERAL settings
      #       
      enabled:                          true

      # ------------------------------------------------------------------------
      # PLAYER settings
      #  
      id:                               emancipator_mini
      type:                             mini

      # PLAYLIST settings
      #
      playlist:
        name:                           emancipator

    # --------------------------------------------------------------------------
    # COMPACT player, Emancipator
    # --------------------------------------------------------------------------
    #
    - player:

      # ------------------------------------------------------------------------
      # GENERAL settings
      #       
      enabled:                          true

      # ------------------------------------------------------------------------
      # PLAYER settings
      #  
      id:                               emancipator_compact
      type:                             compact

      # ------------------------------------------------------------------------
      # PLAYLIST settings
      #
      playlist:
        name:                           emancipator

      # ------------------------------------------------------------------------
      # CONTROL settings
      #
      # skip_forward_backward_button:     true                                  # default: true
      # song_progress_bar:              false                                   # currently dont work om player level
      # forward_backward_skip_seconds:  30                                      # currently dont work on player level

    # --------------------------------------------------------------------------
    # LARGE player, Emancipator
    # --------------------------------------------------------------------------
    #
    - player:

      # ------------------------------------------------------------------------
      # GENERAL settings
      #     
      enabled:                          true

      # ------------------------------------------------------------------------
      # PLAYER settings
      #
      id:                               emancipator_large
      type:                             large

      # ------------------------------------------------------------------------
      # PLAYLIST settings
      #
      playlist:
        name:                           emancipator

    # --------------------------------------------------------------------------
    # LARGE player, Olivia Dean
    # --------------------------------------------------------------------------
    #
    - player:

      # ------------------------------------------------------------------------
      # GENERAL settings
      #    
      enabled:                          true

      # ------------------------------------------------------------------------
      # PLAYER settings
      #
      id:                               olivia_dean_yt_large
      type:                             large
      source:                           video

      # ------------------------------------------------------------------------
      # PLAYLIST settings
      #      
      playlist:
        name:                           olivia_dean_yt

      # ------------------------------------------------------------------------
      # PLUGIN settings
      #
      plugin_manager:
        enabled:                        true
        plugins:                        [ ytp ]

    # --------------------------------------------------------------------------
    # LARGE player, Ludovico Einaudi
    # --------------------------------------------------------------------------
    #
    - player:

      # ------------------------------------------------------------------------
      # GENERAL settings
      #     
      enabled:                          true

      # ------------------------------------------------------------------------
      # PLAYER settings
      #
      id:                               einaudi_yt_large
      type:                             large
      source:                           video

      # ------------------------------------------------------------------------
      # PLAYLIST settings
      #
      playlist:
        name:                           ludovico_einaudi_yt

      # ------------------------------------------------------------------------
      # PLUGIN settings
      #
      plugin_manager:
        enabled:                        true
        plugins:                        [ ytp ]

# ------------------------------------------------------------------------------
# END config