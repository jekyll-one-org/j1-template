# ------------------------------------------------------------------------------
# Description
#
description:
  title:                                J1 VideoPlayer
  scope:                                Default settings
  location:                             _data/modules/defaults/videoPlayer.yml

# ------------------------------------------------------------------------------
# Default settings
#
defaults:

  # GENERAL options
  #
  enabled:                              false

  smoothScroll:
    enabled:                            true

  toolbox:
    enabled:                            false

  playlist:
    enabled:                            true

    search:
      enabled:                          true

    sort:
      enabled:                          true

    modeSwitch:
      enabled:                          true

    mergeSwitch:
      enabled:                          false

    loop:
      enabled:                          false
      pip:                              false

    type:                               cards                                   # list | cards

    cards:
      perRow:                           4

  # ----------------------------------------------------------------------------
  # MODULE options
  # ----------------------------------------------------------------------------

  # videoJS settings
  # 
  videoJS:

    autoStart:                          true
    preloadVideo:                       true                                    # preload: 'auto' | 'metadata' | 'none'

    # videoJS playback rate settings
    #
    playbackRates:
      enabled:                          true
      values:                           [ 0.25, 0.5, 1, 1.5, 2 ]

    # videoJS poster settings
    #
    default_poster:                     /assets/image/icon/videojs/videojs-poster.png


    # videoJS player settings
    # --------------------------------------------------------------------------
    # claude - change skipAd API to local files #1
    # Replaced YouTube player tech with native HTML5 video.js player.
    # All YouTube-specific parameters (cc_load_policy, disablekb, enablejsapi,
    # modestbranding, rel, showinfo, etc.) have been removed.
    # --------------------------------------------------------------------------
    #
    players:

      native:

        # player parameters
        #
        autoplay:                       true                                    # true | false | 'muted' | 'play' | 'any'
        controls:                       true
        fluid:                          true                                    # responsive, fills container width
        fill:                           false                                   # stretch to container dimensions
        responsive:                     true
        preload:                        auto                                    # auto | metadata | none
        playsinline:                    true                                    # prevent fullscreen on iOS by default

        # video parameters
        #
        #default_poster:                /assets/image/icon/videojs/videojs-poster.png
        poster_base:                    video-folder                            # same folder as video
        poster:                         poster.jpg                              # poster image
        start:                          true                                    # set start (trim) of a video allowed
        end:                            true                                    # set end (trim) of a video allowed

        # source type priorities (tried in order)
        #
        sourceOrder:                    [ mp4, webm, ogv ]

      # ------------------------------------------------------------------------
      # claude - Extend J1 VideoPlayer #2
      # The YouTube player used by J1 VideoPlayer (skipad.js) now reads ALL its
      # player parameters from the players.native key above.  The players.youtube
      # section below is retained for backward-compatibility with other modules
      # (e.g. Amplitude/YTP) that still reference it directly; it is NO LONGER
      # used by VideoPlayer's YouTube playback path.
      # ------------------------------------------------------------------------
      youtube:

        # player parameters
        #
        autoplay:                       true
        cc_load_policy:                 0                                       # 0|1, captions are initially hidden
        controls:                       1                                       # 0|1, disable|enable (vjs) controlbar
        disablekb:                      1
        enablejsapi:                    1    
        fs:                             0
        iv_load_policy:                 3                                       # video annotations not shown
        loop:                           0
        modestbranding:                 1
        rel:                            0
        showinfo:                       0

        # video parameters
        #
        # default_poster:               /assets/image/icon/videojs/videojs-poster.png
        poster_base:                    //img.youtube.com/vi
        poster_qualty:                  mqdefault                               # poster taken from poster_base at medium resolution
        start:                          true                                    # set start (trim) of a video allowed
        end:                            true                                    # set end (trim) of a video allowed

    # videoJS Plugin settings
    #
    plugins:

      autoCaption:
        enabled:                        false

      hotKeys:
        enabled:                        false

        seekStep:                       15
        volumeStep:                     0.1

        alwaysCaptureHotkeys:           true
        captureDocumentHotkeys:         false                                   # Capture document keydown events even if the player does not have focus (default: false)
        hotkeysFocusElementFilter:      'function () { return false }'          # default
        enableFullscreen:               true
        enableHoverScroll:              true
        enableInactiveFocus:            true
        enableJogStyle:                 false
        enableMute:                     true
        enableModifiersForNumbers:      true
        enableNumbers:                  false
        enableVolumeScroll:             true
        skipInitialFocus:               false                                   # stops focusing the player on initial Play (default: false)

      skipButtons:
        enabled:                        true
        surroundPlayButton:             true

        backwardIndex:                  1
        forwardIndex:                   1
        forward:                        10
        backward:                       10

      zoomButtons:
        enabled:                        false

        moveX:                          0
        moveY:                          0
        rotate:                         0
        zoom:                           1

# ------------------------------------------------------------------------------
# END config