# ------------------------------------------------------------------------------
# Description
#
description:
  title:                                Justified Gallery
  scope:                                Default settings
  location:                             _data/defaults/gallery.yml

# ------------------------------------------------------------------------------
# User configuration settings
#
defaults:

  # ----------------------------------------------------------------------------
  # GENERAL gallery settings
  #
  # enabled
  # ----------------------------------------------------------------------------
  #   Enables|Disables the use of a gallery
  #
  # xhr_data_path
  # ----------------------------------------------------------------------------
  # The HTML portion of a grid are being read from a HTML file generated
  # automatically from its configuration for all galleries configured.
  # AJAX methods are used to supply the needed HTML code at the time
  # a gallery is initialized by the JS adapter.
  #
  #   values:                           string
  #   default:                          /assets/data/gallery
  #
  # ----------------------------------------------------------------------------
  #
  enabled:                              false                                   # needed for j1.layout_shim_generator.html

  # ----------------------------------------------------------------------------
  # Global settings
  #
  xhr_data_path:                        /assets/data/gallery
  gallery_complete_timeout:             1000

  # ----------------------------------------------------------------------------
  # CSSFilter settings
  #
  filters:
    enabled:                            false
    grayscale:                          1
    contrast:                           0.8
    brightness:                         0.4

  # ----------------------------------------------------------------------------
  # justifiedGallery settings
  #
  gallerySettings:
    rowHeight:                            150
    gutters:                              1

  # ----------------------------------------------------------------------------
  # Lightbox settings
  #
  lightbox:
    enabled:                            true
    type:                               lg                                      # lightGallery

  # ----------------------------------------------------------------------------
  # lightGallery settings
  #
  lightGallery:
    plugins:                            lgThumbnail, lgVideo

    # --------------------------------------------------------------------------
    # lightGallery options
    #
    options:
      licenseKey:                       0000-0000-000-0000
      download:                         false
      alignThumbnails:                  left
      animateThumb:                     true
      autoplayFirstVideo:               true
      videojs:                          false

    # --------------------------------------------------------------------------
    # VideoJS options
    #
    videojsOptions:
      enabled:                          false

      muted:                            false
      preload:                          true

      controls:                         true
      controlBar:
        playbackRates:                  [0.25, 0.5, 1, 1.5, 2]
        remainingTimeDisplay:           true
        pictureInPictureToggle:         false

        volumePanel:
          inline:                       false

        hotkeysPlugin:
          enabled:                      true
          options:
            volumeStep:                 0.2

        skipButtonsPlugin:
          enabled:                      true
          options:
            forward:                    15
            backward:                   15

        zoomPlugin:
          enabled:                      true
          options:
            moveX:                      0
            moveY:                      0
            rotate:                     0
            zoom:                       1

# ------------------------------------------------------------------------------
# END config