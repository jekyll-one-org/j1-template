# ------------------------------------------------------------------------------
# Description
#
description:
  title:                                AmplitudeJS
  scope:                                User settings (playlist)
  location:                             _data/modules/amplitude_playlist_test.yml

# ------------------------------------------------------------------------------
# User settings
#
settings:

  # ----------------------------------------------------------------------------
  # PLAYLIST settings
  # ----------------------------------------------------------------------------
  #
  playlists:

    # --------------------------------------------------------------------------
    # Emancipator - Royalty Free Music
    # --------------------------------------------------------------------------
    #
    - playlist:
      # ------------------------------------------------------------------------
      # GENERAL settings
      #
      enabled:                          true

      name:                             emancipator
      title:                            Emancipator

      # ------------------------------------------------------------------------
      # ALBUM settings
      # ------------------------------------------------------------------------
      album:                            &album_emancipator_music
        name:                           Emancipator Music
        playlist:                       emancipator
        artist:                         Emancipator
        audio_base:                     /assets/audio/album/emancipator
        cover_image:                    /assets/audio/cover/default/placeholder-blue.jpg
        audio_info:                     //emancipatormusic.com/
        audio_fade_in:                  true
        audio_fade_out:                 true
        repeat:                         false
        shuffle:                        false        

# ------------------------------------------------------------------------------
# END config