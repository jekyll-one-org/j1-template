# claude - split J1 Gallery data #1
# The single data file (gallery.yml) has been split into two files:
#
#   - gallery_control.yml per-gallery configuration (this file: galleries)
#   - gallery_media.yml   per-gallery media content (images / videos)
#
# Both files use the same `- gallery:` list structure, keyed by `id`, modeled
# on the Masonry scaffold (masonry_player.yml / masonry_playlist.yml). The
# control config and the playlist content are merged ID-wise (deep_merge) in
# galleries.html and gallery.js. See those files for the merge|sort logic.
# ------------------------------------------------------------------------------

# ==============================================================================
# Description
# ==============================================================================
#
description:
  title:                                Justified Gallery
  scope:                                User control settings
  location:                             _data/gallery_control.yml

# ==============================================================================
# User configuration settings
# ==============================================================================
#
settings:

  # ============================================================================
  # GENERAL options
  # ----------------------------------------------------------------------------
  #
  enabled:                              true

  # ============================================================================
  # All galleries available
  # ----------------------------------------------------------------------------
  #
  galleries:

    # ==========================================================================
    # Image Galleries
    # --------------------------------------------------------------------------

    # --------------------------------------------------------------------------
    # Old Times
    #
    - gallery:
      enabled:                          true

      id:                               jg_old_times
      type:                             image
      image_base_path:                  /assets/image/module/gallery/old_time/image/grand_pa

      # ------------------------------------------------------------------------
      # Justified Gallery settings
      # ------------------------------------------------------------------------
      #
      gallery_options:
        rowHeight:                      250
        gutters:                        3

      # ------------------------------------------------------------------------
      # Lightbox settings
      # ------------------------------------------------------------------------
      #
      lightbox:
        enabled:                        true
        type:                           ps                                      # ps | lb | lg

      lightGallery:
        plugins:                        lgFullscreen, lgRotate, lgThumbnail

        options:
          licenseKey:                   0000-0000-000-0000
          download:                     false
          alignThumbnails:              left

    # --------------------------------------------------------------------------
    # Gallery Mega Cities
    #
    - gallery:
      enabled:                          true

      id:                               jg_mega_cities
      type:                             image
      image_base_path:                  /assets/image/module/swiper/simple/mega_city/image


      # ------------------------------------------------------------------------
      # Justified Gallery settings
      # ------------------------------------------------------------------------
      #
      gallery_options:
        rowHeight:                      150
        gutters:                        1

      # ------------------------------------------------------------------------
      # Lightbox settings
      # ------------------------------------------------------------------------
      #
      lightbox:
        enabled:                        true
        type:                           ps                                      # ps | lb | lg

      lightGallery:
        plugins:                        lgFullscreen, lgRotate, lgThumbnail, lgZoom

        options:
          licenseKey:                   0000-0000-000-0000
          download:                     false
          alignThumbnails:              left
          addClass:                     lg-uno-thumbnails                         # customized thumbnails
          appendThumbnailsTo:           .lg-outer                                 # required for customized thumbnails
          animateThumb:                 false                                     # required for customized thumbnails
          allowMediaOverlap:            true                                      # required for customized thumbnails

      # ------------------------------------------------------------------------
      # CSS filter options
      #
      filters:
        enabled:                        false
        grayscale:                      0
        contrast:                       0.8
        brightness:                     0.4

    # ==========================================================================
    # Video Galleries
    # --------------------------------------------------------------------------

    # --------------------------------------------------------------------------
    # HTML5 VIDEO
    #
    - gallery:
      enabled:                          true

      id:                               jg_video_html5
      type:                             video
      video:                            html5
      video_base_path:                  /assets/video/html5
      image_base_path:                  /assets/video/poster/html5
      thumb_base_path:                  /assets/video/poster/html5

      # ------------------------------------------------------------------------
      # Justified Gallery settings
      # ------------------------------------------------------------------------
      #
      gallery_options:
        rowHeight:                      250
        gutters:                        3

      # ------------------------------------------------------------------------
      # Lightbox|lightGallery settings
      # ------------------------------------------------------------------------
      #
      lightbox:
        enabled:                        true
        type:                           lg

      lightGallery:
        plugins:                        lgThumbnail, lgVideo

        options:
          licenseKey:                   0000-0000-000-0000
          download:                     false
          alignThumbnails:              left
          animateThumb:                 true
          autoplayFirstVideo:           true
          videojs:                      true                                    # jadams: !!!
          videojsTheme:                 vjs-theme-uno

        videojsOptions:
          enabled:                      true
          muted:                        false
          preload:                      true
          controls:                     true
          tracks:                       true                                    # jadams: !!!

          hotKeysPlugin:
            enabled:                    true
            options:
              volumeStep:               0.2          

          controlBar:
            playbackRates:              [0.25, 0.5, 1, 1.5, 2]
            remainingTimeDisplay:       true
            pictureInPictureToggle:     false

            volumePanel:
              inline:                   false

            skipButtonsPlugin:
              enabled:                  true
              options:
                forward:                5
                backward:               5
                backwardIndex:          0
                forwardIndex:           1

            zoomPlugin:
              enabled:                  true
              showZoom:                 true
              showMove:                 false
              showRotate:               false
              gestureHandler:           false
              options:
                moveX:                  0
                moveY:                  0
                rotate:                 0
                zoom:                   1

      # ------------------------------------------------------------------------
      # CSS filter options
      #
      filters:
        enabled:                        false
        grayscale:                      0
        contrast:                       1
        brightness:                     1


    # --------------------------------------------------------------------------
    # Online VIDEO Carpool Karaoke (YouTube)
    #
    - gallery:
      enabled:                          true

      id:                               jg_video_youtube_james_and_adele
      type:                             video
      video:                            youtube
      image_base_path:                  //img.youtube.com/vi

      # ------------------------------------------------------------------------
      # Justified Gallery settings
      # ------------------------------------------------------------------------
      #
      gallery_options:
        rowHeight:                      250
        gutters:                        3

      # ------------------------------------------------------------------------
      # Lightbox|lightGallery settings
      # ------------------------------------------------------------------------
      #
      lightbox:
        enabled:                        true
        type:                           lg

      lightGallery:
        plugins:                        lgThumbnail, lgVideo

        options:
          licenseKey:                   0000-0000-000-0000
          download:                     false
          alignThumbnails:              left
          animateThumb:                 true
          autoplayFirstVideo:           true
          videojs:                      true                                    # jadams: !!!
          videojsTheme:                 vjs-theme-uno

        videojsOptions:
          enabled:                      true
          muted:                        false
          preload:                      true
          controls:                     true
          tracks:                       false                                   # jadams: !!!

          hotKeysPlugin:
            enabled:                    true
            options:
              volumeStep:               0.2          

          controlBar:
            playbackRates:              [0.25, 0.5, 1, 1.5, 2]
            remainingTimeDisplay:       true
            pictureInPictureToggle:     false

            volumePanel:
              inline:                   false

            skipButtonsPlugin:
              enabled:                  true
              options:
                forward:                5
                backward:               5
                backwardIndex:          0
                forwardIndex:           1

            zoomPlugin:
              enabled:                  false
              options:
                moveX:                  0
                moveY:                  0
                rotate:                 0
                zoom:                   1

        playerParams:
          enabled:                      true
          # start:                      ["00:00:50", "00:00:50"]                # start time video1, vido2
          autoplay:                     1                                       # autoplay = 1 only available for YouTube when muted.
          # controls:                   1                                       # default = 0
          # enablejsapi:                1                                       # default = 1
          # hl:                         en                                      # default = en
          # loop:                       0                                       # default = 0
          mute:                         0                                       # default = 1
          # playsinline:                1                                       # for mobile|iOS only
          # wmode:                      opaque                                  # default = opaque

      # ------------------------------------------------------------------------
      # CSS filter options
      #
      filters:
        enabled:                        false
        grayscale:                      0
        contrast:                       1
        brightness:                     1

    # --------------------------------------------------------------------------
    # HTML5 VIDEO (over VideoJS)
    #
    - gallery:
      enabled:                          true

      id:                               jg_video_html5_videojs
      type:                             video
      video:                            html5
      video_base_path:                  /assets/video/html5
      image_base_path:                  /assets/video/poster/html5
      thumb_base_path:                  /assets/video/poster/html5

      # ------------------------------------------------------------------------
      # Justified Gallery settings
      # ------------------------------------------------------------------------
      #
      gallery_options:
        rowHeight:                      250
        gutters:                        3

      # ------------------------------------------------------------------------
      # Lightbox|lightGallery settings
      # ------------------------------------------------------------------------
      #
      lightbox:
        enabled:                        true
        type:                           lg

      lightGallery:
        plugins:                        lgThumbnail, lgVideo

        options:
          licenseKey:                   0000-0000-000-0000
          download:                     false
          alignThumbnails:              left
          animateThumb:                 true
          autoplayFirstVideo:           true
          videojs:                      true                                    # jadams: !!!
          videojsTheme:                 vjs-theme-uno

        videojsOptions:
          enabled:                      true

          muted:                        false
          preload:                      true

          controls:                     true

          hotKeysPlugin:
            enabled:                    true
            options:
              volumeStep:               0.2          

          controlBar:
            playbackRates:              [0.25, 0.5, 1, 1.5, 2]
            remainingTimeDisplay:       true
            pictureInPictureToggle:     false

            volumePanel:
              inline:                   false

            skipButtonsPlugin:
              enabled:                  true
              options:
                forward:                5
                backward:               5
                backwardIndex:          0
                forwardIndex:           1

            zoomPlugin:
              enabled:                  true
              options:
                moveX:                  0
                moveY:                  0
                rotate:                 0
                zoom:                   1

      # ------------------------------------------------------------------------
      # CSS filter options
      #
      filters:
        enabled:                        false
        grayscale:                      0
        contrast:                       1
        brightness:                     1


    # --------------------------------------------------------------------------
    # TinyDesk Concerts, Latin (YouTube)
    #
    - gallery:
      enabled:                          true

      id:                               tdc_latin
      type:                             video
      video:                            youtube
      image_base_path:                  //img.youtube.com/vi

      # ------------------------------------------------------------------------
      # Justified Gallery settings
      # ------------------------------------------------------------------------
      #
      gallery_options:
        rowHeight:                      250
        gutters:                        3

      # ------------------------------------------------------------------------
      # Lightbox|lightGallery settings
      # ------------------------------------------------------------------------
      #
      lightbox:
        enabled:                        true
        type:                           lg

      lightGallery:
        plugins:                        lgThumbnail, lgVideo

        options:
          licenseKey:                   0000-0000-000-0000
          download:                     false
          alignThumbnails:              left
          animateThumb:                 true
          autoplayFirstVideo:           true
          videojs:                      true                                    # jadams: !!!
          videojsTheme:                 vjs-theme-uno

        videojsOptions:
          enabled:                      true
          muted:                        false
          preload:                      true
          controls:                     true

          hotKeysPlugin:
            enabled:                    true
            options:
              volumeStep:               0.2          

          controlBar:
            playbackRates:              [0.25, 0.5, 1, 1.5, 2]
            remainingTimeDisplay:       true
            pictureInPictureToggle:     false

            volumePanel:
              inline:                   false

            skipButtonsPlugin:
              enabled:                  true
              options:
                forward:                5
                backward:               5
                backwardIndex:          0
                forwardIndex:           1

            zoomPlugin:
              enabled:                  false
              options:
                moveX:                  0
                moveY:                  0
                rotate:                 0
                zoom:                   1

        playerParams:
          enabled:                      true
          autoplay:                     1                                       # autoplay = 1 only available for YouTube when muted.
          mute:                         0                                       # default = 1

      # ------------------------------------------------------------------------
      # CSS filter options
      #
      filters:
        enabled:                        false
        grayscale:                      0
        contrast:                       1
        brightness:                     1

# ------------------------------------------------------------------------------
# END config