# ------------------------------------------------------------------------------
# Description
#
description:
  caption:                              J1 Masonry
  scope:                                User settings
  location:                             _data/modules/masonry.yml

# ------------------------------------------------------------------------------
# User configuration settings
#
settings:

  # ----------------------------------------------------------------------------
  # GENERAL options
  # ----------------------------------------------------------------------------
  #
  enabled:                              true

  # ----------------------------------------------------------------------------
  # All grids available
  # ----------------------------------------------------------------------------
  grids:

    # --------------------------------------------------------------------------
    # IMAGES
    # --------------------------------------------------------------------------

    # --------------------------------------------------------------------------
    # Images + Fixed Height + Gutters + Captions + Lightbox
    #
    - grid:
      enabled:                          true

      id:                               image_fixed_height_lb
      type:                             image
      gutters:                          1

      image_base_path:                  /assets/image/module/swiper/simple/mega_city/image
      image_styles:                     img-fluid
      image_height:                     300

      # ------------------------------------------------------------------------
      # Bootstrap responsive options
      #
      responsive:
        xs:                             12
        sm:                             12
        md:                             6
        lg:                             4
        xl:                             4

      # ------------------------------------------------------------------------
      # lightbox settings
      # ------------------------------------------------------------------------
      #
      lightbox:
        enabled:                        true
        type:                           ps                                      # ps | lb | lg

      # ------------------------------------------------------------------------
      # caption options
      #
      caption:
        enabled:                        true
        position:                       bottom                                  # top|bottom|center

      # ------------------------------------------------------------------------
      # Masonry options
      #
      options:
        originTop:                      true
        originLeft:                     true
        initLayout:                     true
        percentPosition:                true

      # ------------------------------------------------------------------------
      # lightGallery options
      #
      lightGallery:
#       plugins:                        lgFullscreen, lgRotate, lgThumbnail
        plugins:                        lgThumbnail

        options:
          licenseKey:                   0000-0000-000-0000
          download:                     false
          alignThumbnails:              left
          animateThumb:                 true

      # ------------------------------------------------------------------------
      # Images
      #
      images:

        # image 1
        - image:
          file:                         denys-nevozhai-1_b.jpg
          width:                        5401
          height:                       3601           
          caption:                      Man posing at the rooftop of Jin Mao Tower Shanghai - China

        # image 2
        - image:
          file:                         thomas-tucker_b.jpg
          width:                        1600
          height:                       1050          
          caption:                      Sunset over Taipei City - Taiwan

        # image 3
        - image:
          file:                         emmad-mazhari_b.jpg
          width:                        1920
          height:                       1822          
          caption:                      Chicago - United States

        # image 4
        - image:
          file:                         johan-mouchet_b.jpg
          width:                        1920
          height:                       2880           
          caption:                      The Queen Bee at the Eureka Tower - Melbourne Southbank Australia

        # image 5
        - image:
          file:                         federico-rizzarelli_b.jpg
          width:                        1920
          height:                       2880          
          caption:                      Shanghai - China

        # image 6
        - image:
          file:                         gints-gailis_b.jpg
          width:                        1440
          height:                       1861           
          caption:                      Shangri-La Hotel Jakarta - Indonesia


    # --------------------------------------------------------------------------
    # VIDEOS
    # --------------------------------------------------------------------------

    # --------------------------------------------------------------------------
    # YouTube Videos
    #
    - grid:
      enabled:                          true

      id:                               youtube
      type:                             video
      gutters:                          2

      # ------------------------------------------------------------------------
      # Bootstrap responsive options
      #
      responsive:
        xs:                             12
        sm:                             12
        md:                             6
        lg:                             6
        xl:                             6

      # ------------------------------------------------------------------------
      # VideoJS settings
      # See settings: //jekyll.one/pages/public/manuals/videojs/videojs_api/
      # ------------------------------------------------------------------------
      #
      videojs:
        enabled:                        true

        theme:                          uno

        # ----------------------------------------------------------------------
        # Player settings
        # See: //jekyll.one/pages/public/manuals/videojs/lightgallery_api
        # ----------------------------------------------------------------------
        #
        player:
          enabled:                      true

          # VideoJS
          # --------------------------------------------------------------------
          videojsPlayer:
            enabled:                    true

            videojsOptions:
              controls:                 true
              tracks:                   true

            controlBar:
              pictureInPictureToggle:   false
              chaptersButton:           true
              subtitlesButton:          true
              playbackRates:            [0.25, 0.5, 1, 1.5, 2]

              volumePanel:
                inline:                 false

              hotkeysPlugin:
                enabled:                true
                options:
                  volumeStep:           0.2

              skipButtonsPlugin:
                enabled:                true
                options:
                  forward:              15
                  backward:             15

              zoomPlugin:
                enabled:                true
                options:
                  moveX:                0
                  moveY:                0
                  rotate:               0
                  zoom:                 1

          # Vimeo
          # --------------------------------------------------------------------
          vimeoPlayer:
            enabled:                    true
            api:                        native                                  # native|videojs

            options:
              autoPlay:                 true
              muted:                    true
#             byline:                   0
#             portrait:                 0
#             color:                    var(--md-gray-100)

          # Wistia
          # --------------------------------------------------------------------
          wistiaPlayer:
            enabled:                    true
            api:                        native                                  # native|videojs

            options:
              autoPlay:                 true
              fullscreenButton:         true
              muted:                    false
              qualityControl:           false

          # Youtube
          # --------------------------------------------------------------------
          youTubePlayer:
            enabled:                    true
            api:                        videojs                                 # native|videojs

            options:
              autoPlay:                 true
              muted:                    true
              showinfo:                 true
              controls:                 true

      # ------------------------------------------------------------------------
      # Lightbox settings
      # See settings for lightbox:     //jekyll.one/pages/public/manuals/modules/lightbox
      # See settings for lightGallery: //jekyll.one/pages/public/manuals/videojs/videojs_api
      # ------------------------------------------------------------------------
      #
      lightbox:
        enabled:                        true
        type:                           lg

      lightGallery:
        plugins:                        lgThumbnail, lgVideo

        options:
          licenseKey:                   0000-0000-000-0000
          download:                     false
          alignThumbnails:              left
#         addClass:                     lg-uno-thumbnails                         # customized thumbnails
#         appendThumbnailsTo:           .lg-outer                                 # required for customized thumbnails
#         animateThumb:                 false                                     # required for customized thumbnails
#         allowMediaOverlap:            true                                      # required for customized thumbnails

      # ------------------------------------------------------------------------
      # caption options
      #
      caption:
        enabled:                        true
        position:                       bottom                                  # top|bottom|center

      # ------------------------------------------------------------------------
      # masonry options
      #
      options:
        originTop:                      true
        originLeft:                     true
        initLayout:                     true
        percentPosition:                true

      # ------------------------------------------------------------------------
      # videos
      #
      videos:

#       video 1
        - video:
          name:                         Carpool Karaoke James and Adele
          type:                         youtube
          api:                          videojs
          size:                         1280-720
          source:                       //youtube.com/Nck6BZga7TQ
          pinterest_prefix:             Pin video
          tweet_prefix:                 Try video
          description: >
                                        <h2>Carpool Karaoke 2015</h2>
                                        <h3>
                                          James is on holidays in London and picks up
                                          Adele for a ride through the city.
                                          On the way, they sing some of their biggest hits.
                                        </h3>
          poster:
            style:                      img-responsive
            source:                     //img.youtube.com/vi/Nck6BZga7TQ/mqdefault.jpg

          caption:
            enabled:                    true
            position:                   bottom
            text:                       YouTube Video &middot; Carpool Karaoke James and Adele

#       video 2
        - video:
          name:                         Last Carpool Karaoke
          type:                         youtube
          api:                          videojs
          size:                         1280-720
          source:                       //youtube.com/nV8UZJNBY6Y
          pinterest_prefix:             Pin video
          tweet_prefix:                 Try video
          description: >
                                        <h2>Carpool Karaoke 2023</h2>
                                        <h3>
                                          Adele wakeups James at home for the very
                                          last Late Late Night Show and for the
