# ------------------------------------------------------------------------------
# MultiInstance VideoPlayer #1
# Multi-instance configuration
# Each entry under 'instances' maps to one VideoPlayerInstance created via
# videoPlayer.createInstance(containerId, options) in the J1 adapter.
#
# Every instance maintains its own independent playlist in localStorage
# (key: playlist_<instanceId>) and its own VideoJS player element.
# ----------------------------------------------------------------------------

# ------------------------------------------------------------------------------
# Description
#
description:
  title:                                J1 videoPlayer
  scope:                                User media settings
  location:                             _data/modules/videoPlayer_media.yml

# ------------------------------------------------------------------------------
# User media configuration settings
#
settings:

  players:

    # --------------------------------------------------------------------------
    # Player 1 – Tiny Desk Concerts
    #
    - player:
      enabled:                          true

      id:                               player_1
      description:                      NPR Tiny Desk Concerts

      playlist:
        # Playlists are merged into the instance's localStorage on page load.
        # Relative filenames are resolved against PLAYLIST_BASE_URL.
        preload:                        [ tinydesk-concerts.json ]

      # All videoJS settings below are per-instance overrides; missing keys
      # fall through to the top-level 'defaults' section.
      videoJS:
        autoStart:                      true

    # --------------------------------------------------------------------------
    # Player 2 – Carpool Karaoke
    #
    - player:
      enabled:                          true
      
      id:                               player_2
      description:                      Carpool Karaoke

      playlist:
        preload:                        [ carpool-karaoke.json ]

      videoJS:
        autoStart:                      true

# ------------------------------------------------------------------------------
# END config